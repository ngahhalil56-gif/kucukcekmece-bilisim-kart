<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist AR Sergi</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background-color: #f8f9fa; }

        /* Kırmızı Başlatma Butonu */
        #ar-button {
            position: absolute;
            bottom: 100px; 
            left: 50%;
            transform: translateX(-50%);
            padding: 18px 36px;
            background-color: #e63946;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            z-index: 1000;
            cursor: pointer;
        }

        /* Küçük Yardımcı Not */
        .hint {
            position: absolute;
            bottom: 60px;
            width: 100%;
            text-align: center;
            color: #666;
            font-size: 12px;
            z-index: 999;
        }

        #ar-element { --ar-button-display: none; width: 100%; height: 100vh; }
    </style>
</head>
<body>

    <model-viewer 
        id="ar-element"
        src="ata_renkli_full8.glb" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        touch-action="pan-y">
        
        <button id="ar-button">🚀 SERGİYİ BAŞLAT</button>
        <div class="hint">Fotoğraf çekmek için telefonunuzun ekran görüntüsü alma tuşlarını kullanın.</div>

    </model-viewer>

    <script>
        const viewer = document.querySelector("#ar-element");
        const arBtn = document.querySelector("#ar-button");

        arBtn.addEventListener("click", () => {
            viewer.activateAR();
        });

        // AR moduna girince butonu ve notu tamamen gizle
        viewer.addEventListener('ar-status', (event) => {
            if (event.detail.status === 'session-started') {
                arBtn.style.display = 'none';
                document.querySelector(".hint").style.display = 'none';
            } else {
                arBtn.style.display = 'block';
                document.querySelector(".hint").style.display = 'block';
            }
        });
    </script>
</body>
</html>
