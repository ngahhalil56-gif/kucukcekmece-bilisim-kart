<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AR Eğitim Kartı</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; }
      /* Yükleme ekranı uyarısı */
      #loading {
        position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
        font-family: Arial, sans-serif; background: rgba(0,0,0,0.7); color: white;
        padding: 20px; border-radius: 10px; z-index: 999; text-align: center;
      }
    </style>
  </head>
  <body>

    <div id="loading">Model Yükleniyor...<br>(Boyut büyük olduğu için lütfen bekleyin)</div>

    <a-scene 
      mindar-image="imageTargetSrc: ./card.mind; uiScanning: #scanning-overlay" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="myModel" src="./Hitem3d-1777107051620-v2.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-gltf-model 
          id="model-entity"
          rotation="0 0 0" 
          position="0 0 0" 
          scale="0.05 0.05 0.05" 
          src="#myModel"
          animation="property: rotation; to: 0 360 0; dur: 5000; easing: linear; loop: true">
        </a-gltf-model>
      </a-entity>
    </a-scene>

    <script>
      // Model yüklendiğinde mesajı gizle
      document.querySelector('#myModel').addEventListener('loaded', () => {
        document.querySelector('#loading').style.display = 'none';
      });
    </script>
  </body>
</html>
